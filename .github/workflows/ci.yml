name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - "**/*.sql"
      - "Directory.Build.props"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - "**/*.sql"
      - "Directory.Build.props"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CreatorLedger.sln

      - name: Build
        run: dotnet build CreatorLedger.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CreatorLedger.sln --configuration Release --no-build --verbosity normal
